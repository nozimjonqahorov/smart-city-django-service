{% extends 'base.html' %}

{% block content %}
<section class="auth-shell">
    <div class="card auth-card">
        <div class="auth-head">
            <div class="auth-icon">OK</div>
            <span class="eyebrow">Tasdiqlash</span>
            <h1 class="section-title" style="margin-top: 1rem;">Emailni tasdiqlang</h1>
            <p class="section-copy" style="margin-left: auto; margin-right: auto;">
                Tasdiqlash havolasi <strong>{{ email }}</strong> manziliga yuborildi. Local ishga tushirishda havola terminal oynasida ko'rinadi.
            </p>
        </div>

        <div style="display: grid; gap: 0.9rem;">
            <div class="chip" style="justify-content: center; width: 100%;">Email yuborildi va faollashtirish kutilmoqda</div>
            <a href="{% url 'login' %}" class="btn btn-outline" style="width: 100%;">Kirish sahifasiga qaytish</a>
        </div>
    </div>
</section>
{% endblock %}

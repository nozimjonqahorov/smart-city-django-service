{% extends 'base.html' %}

{% block content %}
<section class="auth-shell">
    <div class="card auth-card">
        <div class="auth-head">
            <div class="auth-icon" style="color: var(--danger); background: linear-gradient(135deg, rgba(220, 38, 38, 0.12), rgba(245, 158, 11, 0.12));">ER</div>
            <span class="eyebrow" style="background: rgba(220, 38, 38, 0.08); color: var(--danger);">Tasdiqlash xatosi</span>
            <h1 class="section-title" style="margin-top: 1rem;">Havola yaroqsiz</h1>
            <p class="section-copy" style="margin-left: auto; margin-right: auto;">
                Tasdiqlash havolasi eskirgan yoki noto'g'ri. Qayta ro'yxatdan o'tib yangi tasdiqlash havolasini oling.
            </p>
        </div>

        <a href="{% url 'register' %}" class="btn" style="width: 100%;">Ro'yxatdan o'tish</a>
    </div>
</section>
{% endblock %}

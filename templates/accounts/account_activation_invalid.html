{% extends 'base.html' %}

{% block content %}
<div style="min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
    <div class="card animate-fade" style="max-width: 520px; width: 100%; text-align: center; box-shadow: var(--shadow-lg);">
        <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.75rem;">Havola yaroqsiz</h1>
        <p style="color: var(--secondary); line-height: 1.7;">
            Tasdiqlash havolasi eskirgan yoki noto'g'ri. Iltimos, qaytadan ro'yxatdan o'ting.
        </p>
        <a href="{% url 'register' %}" class="btn" style="margin-top: 1.5rem; text-decoration: none;">Ro'yxatdan o'tish</a>
    </div>
</div>
{% endblock %}
